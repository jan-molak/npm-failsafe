name: "Chore: Delete old workflows"
on:
  schedule:
    # Run daily, at 19:14
    - cron: '14 19 * * *'

jobs:
  delete_old_workflows:
    runs-on: ubuntu-latest
    steps:
      - name: Delete old workflows
        uses: Mattraks/delete-workflow-runs@0cf693bc9909e5e867ee8f27b813224ba862939c # v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 30
          keep_minimum_runs: 5
#          dry_run: 'true'
